name: Publish to NuGet

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: dotnet test -c Release

      - name: Pack
        run: |
          dotnet pack src/Community.HotChocolate.Data.Grouping/Community.HotChocolate.Data.Grouping.csproj \
            -c Release -o artifacts /p:Version=${{ steps.ver.outputs.version }}
          dotnet pack src/Community.HotChocolate.Data.Grouping.Analyzers/Community.HotChocolate.Data.Grouping.Analyzers.csproj \
            -c Release -o artifacts /p:Version=${{ steps.ver.outputs.version }}

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
