      <path d="M 50 60 Q 30 60 30 78 L 30 102 Q 30 107 18 107 Q 30 107 30 112 L 30 132 Q 30 150 50 150" />
      <path d="M 150 60 Q 170 60 170 78 L 170 102 Q 170 107 182 107 Q 170 107 170 112 L 170 132 Q 170 150 150 150" />
